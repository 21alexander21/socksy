services:
  socksy:
    build: .
    image: socksy
    container_name: socksy
    restart: unless-stopped
    ports:
      - "${SOCKS_BIND_ADDR:-0.0.0.0}:${SOCKS_PORT:-1080}:1080"
    env_file: .env
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 64m
    logging:
      driver: json-file
      options:
        max-size: "1m"
        max-file: "1"
