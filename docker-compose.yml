services:
  socksy:
    build: .
    image: socksy
    container_name: socksy
    restart: unless-stopped
    network_mode: host
    command:
      - "-p"
      - "${SOCKS_PORT:-1080}"
      - "-b"
      - "0.0.0.0"
      - "-1"
      - "-u"
      - "${SOCKS_USER:?Set SOCKS_USER in .env}"
      - "-P"
      - "${SOCKS_PASS:?Set SOCKS_PASS in .env}"
    read_only: true
    cap_drop:
      - ALL
    mem_limit: 64m
    logging:
      driver: json-file
      options:
        max-size: "1m"
        max-file: "1"
