services:
  socksy:
    build: .
    image: socksy
    container_name: socksy
    restart: unless-stopped
    network_mode: host
    env_file: .env
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
    mem_limit: 64m
    logging:
      driver: json-file
      options:
        max-size: "1m"
        max-file: "1"
